<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="/css/gt.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    p.description {
      color: #666;
      font-size: 13px;
      margin-top: 0;
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
    }

    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #ddd;
    }

    th {
      font-size: 13px;
      color: #555;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      box-sizing: border-box;
      font-size: 13px;
    }

    input[type="number"] {
      width: 60px;
    }

    button {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #e8e8e8;
    }

    button.danger {
      color: #c00;
    }

    button.primary {
      background: #4285f4;
      color: #fff;
      border-color: #4285f4;
    }

    button.primary:hover {
      background: #3367d6;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #0a0;
      display: none;
    }
  </style>
</head>

<body>
  <h1>Custom Grouping Rules</h1>
  <p class="description">
    Define rules to split tab groups by URL path segments.<br>
    For example, host <code>docs.google.com</code> with path depth <code>1</code> will create
    separate groups for <code>docs.google/document</code> and <code>docs.google/spreadsheets</code>.
  </p>
  <table>
    <thead>
      <tr>
        <th>Host</th>
        <th>Path Depth</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rulesBody"></tbody>
  </table>
  <div class="actions">
    <button id="addRule">+ Add Rule</button>
    <button id="saveRules" class="primary">Save</button>
  </div>
  <div id="status">Saved!</div>
  <script src="/js/options.js"></script>
</body>

</html>
