<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Auto-Closed Tabs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; min-height: 100vh; }
    h1 { font-size: 20px; margin-bottom: 16px; color: #fff; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    #searchInput { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #333; background: #2a2a3e; color: #e0e0e0; font-size: 14px; outline: none; }
    #searchInput:focus { border-color: #4da3ff; }
    #clearAll { padding: 8px 14px; border-radius: 6px; border: none; background: #e53935; color: #fff; cursor: pointer; font-size: 13px; }
    #clearAll:hover { background: #c62828; }
    .count { font-size: 13px; color: #999; margin-bottom: 12px; }
    .tab-list { display: flex; flex-direction: column; gap: 6px; }
    .tab-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #2a2a3e; border-radius: 8px; transition: background 0.15s; }
    .tab-item:hover { background: #3a3a4e; }
    .tab-favicon { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-info { flex: 1; min-width: 0; }
    .tab-title { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-url { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .tab-time { font-size: 12px; color: #666; flex-shrink: 0; white-space: nowrap; }
    .tab-restore { padding: 5px 10px; border-radius: 4px; border: none; background: #4da3ff; color: #fff; cursor: pointer; font-size: 12px; flex-shrink: 0; }
    .tab-restore:hover { background: #2979ff; }
    .empty { text-align: center; color: #666; margin-top: 40px; font-size: 15px; }
  </style>
</head>

<body>
  <h1>Auto-Closed Tabs</h1>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search by title or URL...">
    <button id="clearAll">Clear All</button>
  </div>
  <div class="count" id="count"></div>
  <div class="tab-list" id="tabList"></div>
  <div class="empty" id="emptyMsg" style="display:none;">No auto-closed tabs yet.</div>
  <script src="/js/vendor.js"></script>
  <script src="/js/autoClosedTabs.js"></script>
</body>

</html>
